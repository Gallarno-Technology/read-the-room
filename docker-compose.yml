services:
  web_ui:
    build:
      context: .
      dockerfile: web_ui/Dockerfile
    restart: always
    network_mode: ${NETWORK_MODE:-host}  # D-04/D-05: VPS sets NETWORK_MODE=bridge; local leaves unset (host for Sonos UPnP)
    env_file: .env
    user: "${UID}:${GID}"
    volumes:
      - ./users.json:/app/users.json      # User registry
      - ./users:/app/users                # Per-user state, token cache, daemon PID, and event data
      - ./lyrics_cache.db:/app/lyrics_cache.db  # Persists lyrics SQLite cache across restarts

  caddy:
    image: caddy:2-alpine
    restart: always
    network_mode: ${NETWORK_MODE:-host}  # D-04: on bridge, caddy reaches web_ui via service name (WEB_UI_UPSTREAM=web_ui:8888)
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data   # Persists Caddy internal CA so self-signed cert survives restarts

volumes:
  caddy_data:
