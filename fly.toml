# fly.toml app configuration file generated for read-the-room on 2026-05-03T10:56:41-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'read-the-room'
primary_region = 'iad'

[build]
  dockerfile = 'web_ui/Dockerfile'

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# Persistent state for the multi-user registry and per-user token caches.
# web_ui/entrypoint.sh symlinks /app/users.json and /app/users/ here on boot.
# Volume name is historical (predates the multi-user rework); contents are
# users.json + users/{uid}/ trees, not just OAuth caches.
[[mounts]]
  source = 'token_cache'
  destination = '/data'

[env]
  SPOTIFY_REDIRECT_URI = 'https://read-the-room.fly.dev/auth/callback'
