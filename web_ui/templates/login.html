<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>Read the Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;600&family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0b08;
      --surface: #1c1a14;
      --surface-raised: #242018;
      --accent: #c9a84c;
      --accent-dim: #8a6f2e;
      --danger: #a83232;
      --warn: #b5722a;
      --text: #e8e0cc;
      --text-dim: #9a9080;
      --text-faint: #5a5448;
      --border: #2e2a1e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }

    .login-card {
      max-width: 360px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
      margin: 0 16px;
    }

    .login-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 24px 0;
      text-align: center;
    }

    #uid-input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px;
      color: var(--text);
      box-sizing: border-box;
      margin-bottom: 8px;
      outline: none;
    }

    #uid-input::placeholder {
      color: var(--text-dim);
    }

    #uid-input:focus {
      border-color: var(--accent);
    }

    #submit-btn {
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: #0d0b08;
      border: none;
      border-radius: 6px;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
    }

    #submit-btn:hover {
      background: var(--accent-dim);
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #login-error {
      color: var(--danger);
      font-size: 12px;
      min-height: 1.2em;
      margin: 8px 0 0 0;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Read the Room</h1>
    <form id="login-form">
      <label for="uid-input" class="sr-only">Access code</label>
      <input id="uid-input" type="password" placeholder="Access code" autocomplete="off" autofocus>
      <button id="submit-btn" type="submit">Enter</button>
    </form>
    <p id="login-error" role="alert"></p>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const input = document.getElementById('uid-input');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorEl.textContent = '';
      btn.disabled = true;
      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: input.value.trim() })
        });
        const data = await resp.json();
        if (data.ok) {
          window.location.replace('/');
        } else {
          errorEl.textContent = data.error || 'Unknown error';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error — please try again.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
